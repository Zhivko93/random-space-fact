name: Daily Mind-Blowing Fact

on:
  schedule:
    # GitHub Actions cron uses UTC. This is three hours earlier than the previous 07:00 UTC schedule.
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-mind-blowing-fact
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python daily_mindblowing_fact_to_discord.py
        env:
          DISCORD_FACTS_WEBHOOK_URL: ${{ secrets.DISCORD_FACTS_WEBHOOK_URL }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}

      - name: Save sent fact history
        if: always()
        run: |
          if [ -n "$(git status --porcelain sent_fact_history.txt)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add sent_fact_history.txt
            git commit -m "Update sent fact history [skip ci]"
            git push
          fi
